<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NWB KI Bildungs-Bot — Prototyp wird geöffnet …</title>
<meta name="robots" content="noindex" />
<!-- Weiterleitungsziel: bei Bedarf hier die Bot-URL anpassen -->
<meta http-equiv="refresh" content="0; url=https://nwb-ki-bot.vercel.app" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#15140F;--paper:#FAF8F0;--yellow:#FEED00;--ink-2:#534E40;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--paper);
    font-family:'Open Sans',system-ui,sans-serif;color:var(--ink);text-align:center;padding:24px;}
  .box{max-width:420px;}
  .logo{height:38px;margin-bottom:28px;}
  .pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.14em;background:var(--yellow);color:var(--ink);
    border:1px solid var(--ink);border-radius:5px;padding:.3em .6em;margin-bottom:18px;}
  h1{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;margin:0 0 .6rem;}
  p{margin:0;color:var(--ink-2);font-size:.95rem;line-height:1.55;}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid #e6e0cf;border-top-color:var(--ink);
    margin:26px auto 22px;animation:r .8s linear infinite;}
  @keyframes r{to{transform:rotate(360deg);}}
  a.go{display:inline-flex;align-items:center;gap:.5em;margin-top:22px;font-weight:700;font-size:.95rem;
    background:var(--ink);color:var(--paper);text-decoration:none;border-radius:999px;padding:.75em 1.4em;}
  a.go:hover{transform:translateY(-1px);}
  @media (prefers-reduced-motion:reduce){.spin{animation:none;}}
</style>
</head>
<body>
  <div class="box">
    <img class="logo" src="../assets/nwb-logo.svg" alt="NWB" />
    <div><span class="pill">Prototyp</span></div>
    <div class="spin" aria-hidden="true"></div>
    <h1>KI Bildungs-Bot wird geöffnet …</h1>
    <p>Du wirst zum Prototyp weitergeleitet. Dort meldest du dich an.</p>
    <a class="go" id="manual" href="https://nwb-ki-bot.vercel.app">Bot jetzt öffnen →</a>
  </div>
  <script>
    var TARGET = "https://nwb-ki-bot.vercel.app"; // bei Bedarf anpassen
    document.getElementById('manual').setAttribute('href', TARGET);
    setTimeout(function(){ window.location.replace(TARGET); }, 350);
  </script>
</body>
</html>
